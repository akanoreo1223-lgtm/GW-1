<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GW.pdf ダウンロード</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .btn:hover {
      background: #fff;
      color: #111;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="GW.pdf" download="GW.pdf" class="btn">
      PDFをダウンロード
    </a>
  </div>
</body>
</html>
